<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Breakdown Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#8BBCCA;--teal-dark:#6A9BAA;--teal-darker:#4A7A8A;
  --cream:#F5F0D0;--cream-dark:#EAE4BC;
  --yellow:#E8C84A;--yellow-dark:#C9A830;
  --navy:#1A2535;--muted:#4A6070;
  --green-bg:#D4EDE0;--green:#3A7D5A;--green-dark:#1A5A38;
  --red-bg:#F0D4D4;--red:#8B3030;--red-dark:#5A1A1A;
  --orange:#E8944A;--purple:#6B4A9A;--purple-bg:#E8D4F0;
  --blue-bg:#D4E8F5;--blue:#1A5A8A;
}
body{font-family:'Nunito',sans-serif;background:var(--teal);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 80px;color:var(--navy);}
header{width:100%;max-width:740px;padding:22px 0 0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.logo{font-family:'Caveat',cursive;font-size:22px;color:var(--cream);}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;}
.hbtn{background:var(--cream);border:2px solid var(--navy);border-radius:8px;padding:6px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;box-shadow:2px 2px 0 var(--navy);transition:transform .1s,box-shadow .1s;}
.hbtn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--navy);}
.hbtn.active{background:var(--yellow);}
.main{width:100%;max-width:740px;margin-top:24px;}
.card{background:var(--cream);border:2.5px solid var(--navy);border-radius:16px;box-shadow:4px 4px 0 var(--navy);padding:24px;margin-bottom:14px;}
.card-teal{background:var(--teal-dark);border:2.5px solid var(--navy);border-radius:16px;box-shadow:4px 4px 0 var(--navy);padding:22px;margin-bottom:14px;}
.card-navy{background:var(--navy);border:2.5px solid var(--navy);border-radius:16px;box-shadow:4px 4px 0 rgba(0,0,0,.3);padding:22px;margin-bottom:14px;}
.btn-yellow{background:var(--yellow);color:var(--navy);border:2.5px solid var(--navy);border-radius:12px;padding:12px 26px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:3px 3px 0 var(--navy);transition:transform .1s,box-shadow .1s;display:inline-block;}
.btn-yellow:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--navy);}
.btn-yellow:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--navy);}
.btn-cream{background:var(--cream);color:var(--navy);border:2px solid var(--navy);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--navy);transition:transform .1s,box-shadow .1s;display:inline-block;}
.btn-cream:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--navy);}
.btn-sm{background:var(--cream);color:var(--navy);border:2px solid var(--navy);border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--navy);}
.btn-red{background:var(--red-bg);color:var(--red);border:2px solid var(--red);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--red);}

/* PRE-GAME QUIZ */
.tf-btn{background:#fff;border:2px solid var(--navy);border-radius:10px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:2px 2px 0 var(--navy);transition:all .1s;}
.tf-btn:hover{background:var(--cream-dark);}
.tf-btn.tf-correct{background:var(--green-bg);border-color:var(--green);color:var(--green-dark);}
.tf-btn.tf-wrong{background:var(--red-bg);border-color:var(--red);color:var(--red-dark);}
.personalized-tip{background:var(--yellow);border:2px solid var(--navy);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--navy);margin-top:10px;display:none;}

/* DIFF */
.diff-select{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.diff-btn{padding:8px 18px;border:2px solid var(--navy);border-radius:99px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 var(--navy);transition:all .1s;}
.diff-btn.easy{background:#D4EDE0;color:var(--green);}
.diff-btn.medium{background:var(--yellow);color:var(--navy);}
.diff-btn.hard{background:var(--red-bg);color:var(--red);}
.diff-btn.selected{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--navy);}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.info-chip{background:var(--teal-dark);border:2px solid var(--navy);border-radius:12px;padding:13px 8px;text-align:center;box-shadow:2px 2px 0 var(--navy);}
.info-chip .val{font-family:'Caveat',cursive;font-size:24px;color:var(--cream);display:block;margin-bottom:2px;}
.info-chip .lbl{font-size:10px;font-weight:800;color:var(--cream);text-transform:uppercase;letter-spacing:.4px;}
.start-icon{width:76px;height:76px;background:var(--yellow);border:2.5px solid var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:3px 3px 0 var(--navy);}
.start-screen{text-align:center;}
.start-screen h1{font-family:'Caveat',cursive;font-size:38px;color:var(--navy);line-height:1.1;margin-bottom:10px;}
.start-screen>p{font-size:14px;color:var(--muted);line-height:1.7;max-width:480px;margin:0 auto 20px;font-weight:600;}

/* MODEL DIAGRAM */
.model-diagram h3{font-family:'Caveat',cursive;font-size:19px;color:var(--navy);margin-bottom:10px;text-align:center;}
.model-nodes{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:6px 0 10px;}
.model-node{display:flex;flex-direction:column;align-items:center;min-width:68px;}
.node-circle{width:48px;height:48px;border-radius:50%;border:2.5px solid var(--navy);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:2px 2px 0 var(--navy);transition:all .4s;}
.node-circle.broken-node{background:var(--red-bg)!important;border-color:var(--red)!important;animation:npulse 1s infinite;}
@keyframes npulse{0%,100%{box-shadow:2px 2px 0 var(--red),0 0 0 0 rgba(139,48,48,.3);}50%{box-shadow:3px 3px 0 var(--red),0 0 6px 4px rgba(139,48,48,.2);}}
.node-label{font-size:9px;font-weight:700;color:var(--navy);margin-top:4px;text-align:center;max-width:66px;line-height:1.3;}
.node-arrow{font-size:16px;color:var(--navy);padding-top:12px;flex-shrink:0;}
.n-source{background:#D4EAF5;}.n-message{background:#D4F5E8;}.n-channel{background:#F5F0D4;}
.n-receiver{background:#EDD4F5;}.n-feedback{background:#F5D4D4;}.n-noise{background:#F5E8D4;}

/* PROGRESS */
.progress-wrap{margin-bottom:14px;}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:6px;}
.progress-meta span{font-size:13px;font-weight:700;color:var(--cream);}
.streak-disp{color:var(--yellow);}
.progress-track{height:9px;background:rgba(26,37,53,.2);border-radius:99px;border:1.5px solid var(--navy);}
.progress-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* TIMER */
.timer-wrap{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.timer-bar-track{flex:1;height:9px;background:rgba(26,37,53,.2);border-radius:99px;border:1.5px solid var(--navy);overflow:hidden;}
.timer-bar-fill{height:100%;border-radius:99px;transition:width .1s linear,background .3s;}
.timer-num{font-family:'Caveat',cursive;font-size:19px;font-weight:700;min-width:34px;text-align:right;color:var(--cream);}

/* HOT TAKE POLL */
.poll-wrap{background:var(--navy);border:2px solid var(--navy);border-radius:14px;padding:18px;margin-bottom:14px;}
.poll-wrap h4{font-family:'Caveat',cursive;font-size:19px;color:var(--yellow);margin-bottom:6px;}
.poll-wrap p{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:14px;}
.poll-scale{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.poll-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--cream);background:transparent;color:var(--cream);font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.poll-btn:hover,.poll-btn.selected{background:var(--yellow);color:var(--navy);border-color:var(--yellow);}
.poll-results{display:none;}
.poll-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.poll-bar-label{font-size:12px;font-weight:700;color:var(--cream);width:16px;text-align:center;}
.poll-bar-track{flex:1;height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
.poll-bar-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .6s ease;}
.poll-count{font-size:11px;font-weight:600;color:var(--cream);opacity:.7;min-width:30px;}

/* INSTRUCTOR */
.instructor-bar{background:var(--navy);border-radius:12px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.instructor-bar span{font-size:12px;font-weight:700;color:var(--yellow);}
.ibtn{background:var(--yellow);color:var(--navy);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}

/* BADGE */
.badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:10px;border:2px solid var(--navy);box-shadow:2px 2px 0 var(--navy);}
.badge.barrier{background:var(--red-bg);color:var(--red);}
.badge.channel{background:#D4E0F0;color:#1A3A70;}
.badge.feedbackloop{background:var(--purple-bg);color:var(--purple);}
.badge.nonverbal{background:#F0E8D4;color:#704A1A;}
.badge.active-listening{background:var(--green-bg);color:var(--green);}

/* GLOSSARY TERMS */
.gterm{border-bottom:2px dashed var(--yellow-dark);cursor:pointer;font-weight:700;}
.gterm:hover{background:rgba(232,200,74,.25);border-radius:3px;}
.tooltip{position:fixed;background:var(--navy);color:var(--cream);border:2px solid var(--yellow);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;line-height:1.5;max-width:240px;z-index:9999;box-shadow:3px 3px 0 var(--yellow);pointer-events:none;display:none;}

/* TYPEWRITER */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.cursor{display:inline-block;width:2px;height:14px;background:var(--cream);margin-left:2px;animation:blink .7s infinite;vertical-align:middle;}

/* SCENARIO */
.scenario-card{background:var(--teal-dark);border:2px solid var(--navy);border-radius:12px;padding:15px 17px;margin-bottom:14px;box-shadow:2px 2px 0 var(--navy);}
.scenario-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--cream);margin-bottom:7px;}
.scenario-text{font-size:14px;line-height:1.75;color:var(--cream);min-height:60px;}

/* HINT */
.hint-box{background:var(--yellow);border:2px solid var(--navy);border-radius:10px;padding:11px 14px;margin-bottom:12px;box-shadow:2px 2px 0 var(--navy);}
.hint-box p{font-size:13px;font-weight:700;color:var(--navy);line-height:1.5;}

/* WATCH OUT TIP */
.watchout-tip{background:var(--purple-bg);border:2px solid var(--purple);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--purple);line-height:1.5;}
.watchout-tip strong{font-weight:800;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.opt{background:#fff;border:2px solid var(--navy);border-radius:12px;padding:12px 14px;text-align:left;cursor:pointer;font-size:14px;font-weight:600;color:var(--navy);font-family:'Nunito',sans-serif;line-height:1.5;display:flex;align-items:flex-start;gap:10px;box-shadow:2px 2px 0 var(--navy);transition:transform .1s,box-shadow .1s,background .1s;}
.opt:hover:not(:disabled){background:var(--cream-dark);transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--navy);}
.opt-letter{width:27px;height:27px;min-width:27px;border-radius:50%;background:var(--teal);border:2px solid var(--navy);display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:15px;font-weight:700;color:var(--cream);flex-shrink:0;}
.opt.correct{background:var(--green-bg);border-color:var(--green);box-shadow:2px 2px 0 var(--green);}
.opt.correct .opt-letter{background:var(--green);border-color:var(--green);color:#fff;}
.opt.wrong{background:var(--red-bg);border-color:var(--red);box-shadow:2px 2px 0 var(--red);}
.opt.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff;}
.opt:disabled{cursor:default;}
.opt.hidden-opt{display:none;}

/* FEEDBACK */
.feedback{border-radius:12px;padding:14px 15px;font-size:13px;line-height:1.7;display:none;margin-bottom:12px;border:2px solid;}
.feedback.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-dark);}
.feedback.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red-dark);}
.fs-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:5px;font-size:13px;}
.fs-label{font-weight:800;min-width:88px;flex-shrink:0;}
.wrong-why{background:#fff;border:1.5px solid var(--navy);border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;font-weight:600;color:var(--navy);line-height:1.5;}
.wrong-why strong{font-weight:800;color:var(--red);}
.concept-tag{display:inline-block;background:var(--navy);color:var(--cream);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-top:6px;margin-right:6px;}
.citation{font-size:11px;font-style:italic;color:var(--muted);margin-top:6px;font-weight:600;}
.chapter-link{display:inline-block;background:var(--blue-bg);color:var(--blue);border:1.5px solid var(--blue);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;margin-top:6px;cursor:pointer;}

/* REWRITE COMPARE */
.rewrite-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.rw-box{border-radius:10px;padding:12px;border:2px solid;}
.rw-box.bad{background:var(--red-bg);border-color:var(--red);}
.rw-box.good{background:var(--green-bg);border-color:var(--green);}
.rw-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.rw-box.bad .rw-label{color:var(--red);}
.rw-box.good .rw-label{color:var(--green);}
.rw-text{font-size:13px;font-weight:600;line-height:1.6;}
.rw-box.bad .rw-text{color:var(--red-dark);}
.rw-box.good .rw-text{color:var(--green-dark);}

/* MODEL BREAKDOWN IN FEEDBACK */
.model-breakdown-inline{margin-top:10px;}
.model-breakdown-inline p{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.mbi-nodes{display:flex;align-items:center;gap:0;overflow-x:auto;padding:4px 0;}
.mbi-node{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.mbi-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--navy);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s;}
.mbi-circle.broken{background:var(--red-bg)!important;border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(139,48,48,.3);}
.mbi-label{font-size:8px;font-weight:700;color:var(--navy);margin-top:3px;text-align:center;}
.mbi-arrow{font-size:12px;color:var(--navy);padding-top:9px;flex-shrink:0;}

/* PEER TEACH */
.peer-teach-box{background:var(--blue-bg);border:2px solid var(--blue);border-radius:10px;padding:12px;margin-top:10px;display:none;}
.peer-teach-box h4{font-size:13px;font-weight:800;color:var(--blue);margin-bottom:7px;}
.peer-teach-input{width:100%;border:1.5px solid var(--navy);border-radius:8px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--navy);background:#fff;resize:none;height:60px;outline:none;}
.peer-teach-input:focus{border-color:var(--blue);}
.peer-save-btn{background:var(--blue-bg);color:var(--blue);border:2px solid var(--blue);border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;}

/* VIDEO LINK */
.video-link{display:flex;align-items:center;gap:10px;background:var(--navy);border-radius:10px;padding:11px 14px;margin-top:10px;cursor:pointer;text-decoration:none;}
.video-link:hover{opacity:.9;}
.video-thumb{width:40px;height:40px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.video-info{flex:1;}
.video-title{font-size:12px;font-weight:700;color:var(--cream);}
.video-sub{font-size:11px;color:rgba(245,240,208,.6);font-weight:600;}

/* NEXT / REPLAY */
.btn-replay{background:var(--purple-bg);color:var(--purple);border:2px solid var(--purple);border-radius:10px;padding:8px 15px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:none;margin-right:8px;margin-bottom:8px;}
.btn-next{background:var(--yellow);color:var(--navy);border:2.5px solid var(--navy);border-radius:12px;padding:11px 24px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:none;box-shadow:3px 3px 0 var(--navy);transition:transform .1s,box-shadow .1s;}
.btn-next:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--navy);}

/* CONCEPT CARD */
.concept-card{text-align:center;padding:8px 0;}
.concept-card h2{font-family:'Caveat',cursive;font-size:26px;color:var(--cream);margin-bottom:8px;}
.concept-card .cc-icon{font-size:46px;margin-bottom:10px;}
.concept-card p{font-size:14px;font-weight:600;color:var(--cream);line-height:1.7;margin-bottom:14px;}
.concept-card .cc-cite{font-size:12px;font-style:italic;color:rgba(245,240,208,.65);font-weight:600;}

/* RESULTS */
.results{text-align:center;}
.confetti-wrap{position:relative;height:60px;overflow:hidden;margin-bottom:4px;}
.confetti-piece{position:absolute;width:9px;height:9px;animation:cfall 1.4s ease-out both;}
@keyframes cfall{from{transform:translateY(-10px) rotate(0);opacity:1;}to{transform:translateY(70px) rotate(400deg);opacity:0;}}
.score-ring{width:120px;height:120px;margin:0 auto 14px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(26,37,53,.15);stroke-width:10;}
.ring-fill{fill:none;stroke:var(--yellow);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-family:'Caveat',cursive;font-size:34px;color:var(--navy);line-height:1;}
.score-pct{font-size:12px;font-weight:700;color:var(--muted);}
.results h2{font-family:'Caveat',cursive;font-size:28px;margin-bottom:6px;color:var(--navy);}
.results .sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto 16px;font-weight:600;}

/* TROPHIES */
.trophy-case{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
.trophy{background:var(--cream-dark);border:2px solid var(--navy);border-radius:12px;padding:10px 14px;text-align:center;box-shadow:2px 2px 0 var(--navy);min-width:100px;}
.trophy-icon{font-size:28px;display:block;margin-bottom:4px;}
.trophy-name{font-size:11px;font-weight:800;color:var(--navy);display:block;}
.trophy-desc{font-size:10px;font-weight:600;color:var(--muted);}

/* MISCONCEPTION CALLOUT */
.misconception-box{background:var(--red-bg);border:2px solid var(--red);border-radius:12px;padding:14px;margin-bottom:14px;text-align:left;}
.misconception-box h4{font-size:13px;font-weight:800;color:var(--red);margin-bottom:8px;}
.misconception-item{font-size:13px;font-weight:600;color:var(--red-dark);margin-bottom:5px;padding-left:12px;position:relative;}
.misconception-item::before{content:"⚠";position:absolute;left:0;font-size:11px;}

/* CONCEPT BREAKDOWN */
.concept-breakdown{text-align:left;margin-bottom:14px;}
.cb-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;}
.cb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.cb-label{font-size:12px;font-weight:700;color:var(--navy);min-width:120px;}
.cb-bar-track{flex:1;height:9px;background:rgba(26,37,53,.1);border-radius:99px;border:1.5px solid var(--navy);overflow:hidden;}
.cb-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.cb-score{font-size:12px;font-weight:700;color:var(--navy);min-width:32px;text-align:right;}

/* SPACED REPETITION */
.spaced-rep{background:var(--teal-dark);border:2px solid var(--navy);border-radius:14px;padding:16px;margin-bottom:14px;}
.spaced-rep h3{font-family:'Caveat',cursive;font-size:20px;color:var(--cream);margin-bottom:12px;}
.sr-day{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.sr-day-label{background:var(--yellow);color:var(--navy);border:1.5px solid var(--navy);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;min-width:80px;text-align:center;flex-shrink:0;}
.sr-content{font-size:13px;font-weight:600;color:var(--cream);line-height:1.5;}

/* RECAP */
.recap-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;}
.recap-item{background:#fff;border:2px solid var(--navy);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;box-shadow:2px 2px 0 var(--navy);}
.recap-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px;border:2px solid;}
.recap-icon.ok{background:var(--green-bg);color:var(--green);border-color:var(--green);}
.recap-icon.bad{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.recap-q{font-size:12px;font-weight:700;margin-bottom:3px;color:var(--navy);}
.recap-a{font-size:11px;color:var(--muted);font-weight:600;}
.recap-a.wa{color:var(--red);}

/* TAKEAWAYS */
.takeaways{background:var(--teal-dark);border:2px solid var(--navy);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:3px 3px 0 var(--navy);}
.takeaways h3{font-family:'Caveat',cursive;font-size:19px;color:var(--cream);margin-bottom:10px;}
.takeaways ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
.takeaways li{font-size:13px;font-weight:600;color:var(--cream);line-height:1.6;display:flex;gap:9px;}
.takeaways li::before{content:"";width:7px;height:7px;min-width:7px;background:var(--yellow);border-radius:50%;margin-top:7px;border:1.5px solid var(--navy);}

/* LEADERBOARD */
.lb-head{margin-bottom:16px;}
.lb-head h2{font-family:'Caveat',cursive;font-size:30px;color:var(--cream);margin-bottom:3px;}
.lb-head p{font-size:13px;font-weight:600;color:var(--cream);opacity:.8;}
.lb-table{background:var(--cream);border:2.5px solid var(--navy);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:4px 4px 0 var(--navy);}
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1.5px solid var(--navy);}
.lb-row:last-child{border-bottom:none;}
.lb-row.lbh{background:var(--teal-dark);padding:8px 15px;}
.lb-row.lbh span{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--cream);}
.lb-rank{width:28px;text-align:center;font-family:'Caveat',cursive;font-size:18px;color:var(--muted);}
.lb-rank.top{color:var(--navy);}
.lb-name{flex:1;font-size:13px;font-weight:700;color:var(--navy);}
.lb-diff{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;border:1.5px solid var(--navy);}
.lb-score{font-family:'Caveat',cursive;font-size:20px;color:var(--navy);}
.lb-empty{text-align:center;padding:32px;color:var(--muted);font-size:14px;font-weight:600;}

/* MISCONCEPTION DASHBOARD */
.misc-dashboard{background:var(--cream);border:2.5px solid var(--navy);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:4px 4px 0 var(--navy);}
.misc-header{background:var(--teal-dark);padding:10px 16px;}
.misc-header h3{font-family:'Caveat',cursive;font-size:18px;color:var(--cream);}
.misc-row{padding:11px 16px;border-bottom:1.5px solid var(--navy);display:flex;align-items:center;gap:10px;}
.misc-row:last-child{border-bottom:none;}
.misc-q{flex:1;font-size:12px;font-weight:600;color:var(--navy);}
.misc-pct{font-size:12px;font-weight:800;color:var(--red);}

/* GLOSSARY */
.glossary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gloss-card{background:var(--cream);border:2px solid var(--navy);border-radius:12px;padding:13px;box-shadow:2px 2px 0 var(--navy);}
.gloss-term{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.gloss-def{font-size:12px;font-weight:600;color:var(--muted);line-height:1.5;}
.gloss-src{font-size:11px;font-style:italic;color:var(--teal-darker);margin-top:4px;font-weight:600;}
.gloss-ch{font-size:11px;font-weight:700;color:var(--blue);margin-top:3px;}

/* FADE */
.fade-in{animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* SCENARIO BUILDER */
.scenario-builder input,.scenario-builder select,.scenario-builder textarea{width:100%;border:2px solid var(--navy);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--navy);background:#fff;outline:none;margin-bottom:10px;}
.scenario-builder input:focus,.scenario-builder select:focus,.scenario-builder textarea:focus{border-color:var(--teal-dark);}
.scenario-builder label{font-size:12px;font-weight:800;color:var(--navy);display:block;margin-bottom:4px;}
.scenario-preview{background:var(--teal-dark);border:2px solid var(--navy);border-radius:10px;padding:13px;margin-top:10px;display:none;}
.scenario-preview p{font-size:13px;font-weight:600;color:var(--cream);line-height:1.6;}

@media(max-width:500px){.info-grid{grid-template-columns:repeat(2,1fr);}.glossary-grid{grid-template-columns:1fr;}.rewrite-compare{grid-template-columns:1fr;}}
</style>
</head>

  'active listening':{def:'Fully concentrating on, understanding, and responding to a speaker — not just passively hearing words.',cite:'Robbins & Judge (2019)',ch:'Ch. 11, p. 365'},
  'encoding':{def:'The process by which a sender translates thoughts into a communicable message (words, symbols, tone).',cite:'Shannon & Weaver (1949)',ch:'Ch. 11, p. 349'},
  'decoding':{def:'The receiver\'s process of interpreting and making sense of the sender\'s encoded message.',cite:'Shannon & Weaver (1949)',ch:'Ch. 11, p. 349'},
  'upward communication':{def:'Information flowing from lower-level employees to higher-level management in an organization.',cite:'Robbins & Judge (2019)',ch:'Ch. 11, p. 358'},
  'information overload':{def:'When the quantity or complexity of information exceeds a receiver\'s capacity to process it effectively.',cite:'Robbins & Judge (2019)',ch:'Ch. 11, p. 363'},

/* ── TOOLTIP / GLOSSARY ── */
function attachGlossary(){
  document.querySelectorAll('.gterm').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const key=el.dataset.term;const g=glossary[key];if(!g)return;
      const tt=document.getElementById('tooltip');
      tt.innerHTML=`<strong>${key}</strong><br>${g.def}<br><em style="opacity:.7;font-size:11px;">${g.cite} — ${g.ch}</em>`;
      tt.style.display='block';
      const r=el.getBoundingClientRect();
      tt.style.left=Math.min(r.left,window.innerWidth-260)+'px';
      tt.style.top=(r.bottom+6)+'px';
    });
    el.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none';});
  });
}

function tagTerms(text){
  let r=text;
  Object.keys(glossary).forEach(term=>{
    const re=new RegExp(`\\b(${term.replace(/[-()]/g,'\\$&')})\\b`,'gi');
    r=r.replace(re,`<span class="gterm" data-term="${term}">$1</span>`);
  });
  return r;
}

let typewriterInt=null;
function typewrite(el,text,cb){
  let i=0;el.innerHTML='<span class="cursor"></span>';
  typewriterInt=setInterval(()=>{
    el.innerHTML=text.slice(0,i)+'<span class="cursor"></span>';
    i++;if(i>text.length){clearInterval(typewriterInt);el.innerHTML=tagTerms(text);if(cb)cb();}
  },18);
}

function renderGame(app){
  const q=questions[current];

    ${instructorMode?`<div class="instructor-bar">
      <span>👨‍🏫 Instructor</span>

function votePoll(n){
  const pollKey=`q${current}`;
  const pd=pollData[pollKey];
  if(pd.voted)return;
  pd.votes[n-1]++;pd.voted=true;pd.lastVote=n;
  const totalVotes=pd.votes.reduce((a,b)=>a+b,0)||1;
  const pr=document.getElementById('poll-results');
  if(pr){
    pr.style.display='block';
    pr.innerHTML=[1,2,3,4,5].map(num=>`<div class="poll-bar-row">
      <span class="poll-bar-label">${num}</span>
      <div class="poll-bar-track"><div class="poll-bar-fill" style="width:${Math.round((pd.votes[num-1]/totalVotes)*100)}%"></div></div>
      <span class="poll-count">${pd.votes[num-1]}</span>
    </div>`).join('');
  }
  document.querySelectorAll('.poll-btn').forEach((b,i)=>{b.disabled=true;if(i+1===n)b.classList.add('selected');});
}

function startTimer(){
  clearTimer();timeLeft=TIMER;
  timerInt=setInterval(()=>{
    if(instructorPaused)return;
    timeLeft--;
    const tb=document.getElementById('tbar'),tn=document.getElementById('tnum');
    if(!tb||!tn){clearTimer();return;}
    const p=(timeLeft/TIMER)*100,c=timeLeft>15?'#E8C84A':timeLeft>7?'#E8944A':'#E84A4A';
    tb.style.width=p+'%';tb.style.background=c;tn.textContent=timeLeft+'s';
    if(timeLeft<=0){clearTimer();autoTimeout();}
  },1000);
}
function clearTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}if(typewriterInt){clearInterval(typewriterInt);typewriterInt=null;}}

function autoTimeout(){
  if(answered)return;answered=true;
  const q=questions[current];
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('correct');});
  showFeedback(q,-1,false);streak=0;
  recordMisc(q,-1);
  answers.push({q:q.question,chosen:-1,correct:q.correct,options:q.options,ok:false,concept:q.concept,modelEl:q.modelEl});
}

function choose(i){
  if(answered)return;answered=true;clearTimer();
  const q=questions[current];
  document.querySelectorAll('.opt').forEach((b,idx)=>{b.disabled=true;if(idx===q.correct)b.classList.add('correct');else if(idx===i&&i!==q.correct)b.classList.add('wrong');});
  const ok=i===q.correct;
  if(ok){score++;streak++;if(streak>maxStreak)maxStreak=streak;}else streak=0;
  recordMisc(q,i);
  answers.push({q:q.question,chosen:i,correct:q.correct,options:q.options,ok,concept:q.concept,modelEl:q.modelEl});
  showFeedback(q,i,ok);
}

function recordMisc(q,chosen){
  const misc=getMisc();
  const key=q.question.slice(0,50);
  if(!misc[key])misc[key]={q:q.question,wrong:{},total:0};
  misc[key].total++;
  if(chosen!==-1&&chosen!==q.correct){
    const wk=q.options[chosen];
    misc[key].wrong[wk]=(misc[key].wrong[wk]||0)+1;
  }
  saveMisc(misc);
}

function showFeedback(q,chosen,ok){
  const fb=document.getElementById('fb');if(!fb)return;
  fb.style.display='block';fb.className=`feedback ${ok?'correct':'wrong'}`;

  let wrongCallout='';
  if(!ok&&chosen>=0&&q.wrongWhy&&q.wrongWhy[chosen])
    wrongCallout=`<div class="wrong-why"><strong>Why that answer is tempting:</strong> ${q.wrongWhy[chosen]}</div>`;

  const timeoutNote=chosen===-1?'<strong>Time\'s up!</strong> ':'';

  // inline model breakdown
  const modelNodes=[['📤','source'],['💬','message'],['📡','channel'],['📥','receiver'],['🔁','feedback'],['⚡','noise']];
  const mbiHtml=modelNodes.map(([ic,id],i)=>`
    <div class="mbi-node"><div class="mbi-circle n-${id} ${id===q.modelEl?'broken':''}">${ic}</div><div class="mbi-label">${id}</div></div>
    ${i<modelNodes.length-1?'<div class="mbi-arrow">→</div>':''}`).join('');

  fb.innerHTML=`${timeoutNote}
    <div class="fs-row"><span class="fs-label">❌ What went wrong:</span><span>${q.whatWentWrong}</span></div>
    <div class="fs-row"><span class="fs-label">✅ Better approach:</span><span>${q.whatShouldHappen}</span></div>
    <div class="fs-row"><span class="fs-label">📖 Explanation:</span><span>${q.feedback}</span></div>
    ${wrongCallout}
    <div class="rewrite-compare">
      <div class="rw-box bad"><div class="rw-label">❌ What was said</div><div class="rw-text">${q.badRewrite}</div></div>
      <div class="rw-box good"><div class="rw-label">✅ Better version</div><div class="rw-text">${q.goodRewrite}</div></div>
    </div>
    <div class="model-breakdown-inline"><p>Where the model broke down:</p><div class="mbi-nodes">${mbiHtml}</div></div>
    <span class="concept-tag">📌 ${q.concept}</span>
    <a href="${q.videoUrl}" target="_blank" class="video-link">
      <div class="video-thumb">▶</div>
      <div class="video-info"><div class="video-title">${q.videoTitle}</div><div class="video-sub">${q.videoSub}</div></div>
    </a>
    <div class="peer-teach-box" id="pt-box">
      <h4>🧑‍🏫 Teach it back</h4>
      <p style="font-size:12px;font-weight:600;color:var(--blue);margin-bottom:7px;">Explain why the correct answer is right in one sentence. This gets saved to your study guide.</p>
      <textarea class="peer-teach-input" id="pt-input" placeholder="In my own words..."></textarea>
      <button class="peer-save-btn" onclick="savePeerTeach(${current})">Save explanation</button>
    </div>
    <span class="chapter-link" onclick="alert('${q.citation}')">📚 ${q.citation.slice(0,40)}...</span>`;

  // show peer teach on correct
  const ptBox=document.getElementById('pt-box');
  if(ptBox)ptBox.style.display=ok?'block':'none';

  const nxt=document.getElementById('nxt');if(nxt)nxt.style.display='inline-block';
  if(!ok){const rb=document.getElementById('replaybtn');if(rb)rb.style.display='inline-block';}
  attachGlossary();
}

function savePeerTeach(idx){

  const val=inp.value.trim();if(!val)return;
  peerTeachAnswers[idx]=val;
  inp.disabled=true;document.querySelector('.peer-save-btn').textContent='✓ Saved!';

function showReflection(){

function nextQ(){
  clearTimer();instructorPaused=false;current++;answered=false;
  if(current<questions.length&&current%3===0&&conceptCardQueue.length>0){view='concept';render();return;}
  if(current>=questions.length){view='results';render();}else render();
}
function instructorPause(){instructorPaused=!instructorPaused;if(view==='game')render();}
function revealAns(){if(!answered)choose(questions[current].correct);}
function skipQ(){clearTimer();current++;answered=false;if(current>=questions.length){view='results';render();}else render();}

/* ── CONCEPT CARD ── */
function renderConceptCard(app){
  clearTimer();const cc=conceptCardQueue.shift()||conceptCards[0];
  app.innerHTML=`<div class="card-teal fade-in concept-card">
    <p style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--cream);opacity:.7;margin-bottom:10px;">Quick knowledge check-in</p>
    <div class="cc-icon">${cc.icon}</div>
    <h2>${cc.title}</h2>
    <p>${tagTerms(cc.body)}</p>
    <p class="cc-cite">Source: ${cc.cite}</p>
    <div style="margin-top:18px;"><button class="btn-yellow" onclick="continueGame()">Got it — continue →</button></div>
  </div>`;
  attachGlossary();
}
function continueGame(){view='game';render();}

/* ── RESULTS ── */
function renderResults(app){
  clearTimer();
  const pct=Math.round((score/questions.length)*100);
  let msg,sub;
  if(pct===100){msg='Perfect score!';sub='Outstanding — you identified every communication breakdown correctly.';}
  else if(pct>=70){msg='Strong performance!';sub='You caught most of the breakdowns. Review the ones you missed to sharpen your instincts.';}
  else if(pct>=50){msg='Good effort!';sub='You spotted several key issues. Keep the communication model in mind as you practice.';}
  else{msg='Keep building.';sub='Communication breakdowns are subtle in real life too. Revisit the feedback on each question.';}

  const r=50,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  const showConfetti=pct>=80;

  // trophies
  const trophies=[];
  if(maxStreak>=5)trophies.push({icon:'🏎️',name:'Speed Demon',desc:'5+ correct in a row'});
  if(pct===100)trophies.push({icon:'🎓',name:'Scholar',desc:'Perfect score'});
  if(answers.filter(a=>a.ok).slice(-3).length===3&&answers.length>=3)trophies.push({icon:'💪',name:'Comeback Kid',desc:'Last 3 all correct'});
  if(Object.keys(peerTeachAnswers).length>=3)trophies.push({icon:'🧑‍🏫',name:'Peer Teacher',desc:'Explained 3+ answers'});
  if(difficulty==='hard'&&pct>=60)trophies.push({icon:'🦁',name:'Hard Mode Hero',desc:'60%+ on Hard'});

  // concept breakdown
  const cmap={};
  answers.forEach(a=>{if(!cmap[a.concept])cmap[a.concept]={r:0,t:0};cmap[a.concept].t++;if(a.ok)cmap[a.concept].r++;});
  const struggles=Object.entries(cmap).filter(([,v])=>v.r/v.t<0.6).map(([k])=>k);

  const cbRows=Object.entries(cmap).map(([c,v])=>{
    const cp=Math.round((v.r/v.t)*100);
    const col=cp>=80?'var(--green)':cp>=50?'var(--yellow-dark)':'var(--red)';
    return `<div class="cb-row"><span class="cb-label">${c}</span><div class="cb-bar-track"><div class="cb-bar-fill" style="width:0%;background:${col}" data-w="${cp}"></div></div><span class="cb-score">${v.r}/${v.t}</span></div>`;
  }).join('');

  // misconception from wrong answers
  const miscCallouts=answers.filter(a=>!a.ok&&a.chosen>=0).map(a=>`<div class="misconception-item">${a.options[a.chosen]}</div>`).join('');

  // spaced repetition
  const today=new Date();
  const fmtDate=(d)=>d.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
  const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const srConcepts=struggles.length?struggles:Object.keys(cmap).slice(0,2);
  const srSchedule=srConcepts.slice(0,3).map((c,i)=>{
    const days=[1,3,7];
    return `<div class="sr-day"><span class="sr-day-label">${fmtDate(addDays(today,days[i]))}</span><span class="sr-content">Review: <strong>${c}</strong> — re-read Robbins & Judge Ch. 11 and revisit your wrong answers on this concept.</span></div>`;
  }).join('');

  const recapHtml=answers.map((a,i)=>`
    <div class="recap-item">
      <div class="recap-icon ${a.ok?'ok':'bad'}">${a.ok?'✓':'✗'}</div>
      <div style="flex:1;">
        <div class="recap-q">Q${i+1}: ${a.q}</div>
        ${!a.ok?`<div class="recap-a wa">You chose: ${a.chosen===-1?'Timed out':a.options[a.chosen]}</div><div class="recap-a">Correct: ${a.options[a.correct]}</div>`:'<div class="recap-a">Correct!</div>'}
        <div style="font-size:10px;font-weight:700;color:var(--teal-darker);margin-top:2px;">Concept: ${a.concept} · Model: ${a.modelEl}</div>
        ${peerTeachAnswers[i]?`<div style="font-size:12px;font-weight:600;color:var(--blue);margin-top:4px;font-style:italic;">Your explanation: "${peerTeachAnswers[i]}"</div>`:''}
      </div>
    </div>`).join('');

  const name=prompt('Enter your name for the leaderboard (or cancel to skip):');
  if(name&&name.trim())saveLB({name:name.trim(),score,total:questions.length,pct,difficulty,streak:maxStreak,time:Date.now()});

  app.innerHTML=`<div class="fade-in">
    ${showConfetti?`<div class="confetti-wrap" id="confetti"></div>`:''}
    <div class="card" style="text-align:center;margin-bottom:14px;">
      <div class="score-ring"><svg width="120" height="120" viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="${r}"/><circle class="ring-fill" cx="60" cy="60" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="ring"/></svg><div class="score-center"><span class="score-num">${score}/${questions.length}</span><span class="score-pct">${pct}%</span></div></div>
      <h2>${msg}</h2>
      <p class="sub">${sub}</p>
      ${maxStreak>=3?`<p style="font-size:13px;font-weight:700;color:var(--orange);margin-bottom:8px;">🔥 Best streak: ${maxStreak} in a row!</p>`:''}
      ${struggles.length?`<p style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;">Focus areas: ${struggles.join(', ')}</p>`:''}
      ${trophies.length?`<div class="trophy-case">${trophies.map(t=>`<div class="trophy"><span class="trophy-icon">${t.icon}</span><span class="trophy-name">${t.name}</span><span class="trophy-desc">${t.desc}</span></div>`).join('')}</div>`:''}
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;">
        <button class="btn-yellow" onclick="startGame()">Play again</button>
        <button class="btn-cream" onclick="switchView('leaderboard')">🏆 Scores</button>
        <button class="btn-cream" onclick="exportStudyGuide()">📄 Study guide</button>
        <button class="btn-cream" onclick="switchView('builder')">🛠 Build scenario</button>
      </div>
    </div>

    ${miscCallouts?`<div class="card misconception-box" style="margin-bottom:14px;">
      <h4>⚠️ Common wrong answers you chose</h4>${miscCallouts}
      <p style="font-size:12px;font-weight:600;color:var(--red-dark);margin-top:8px;">These are misconceptions to address in your debrief.</p>
    </div>`:''}

    <div class="card" style="margin-bottom:14px;">
      <div class="concept-breakdown"><div class="cb-title">Performance by concept</div>${cbRows}</div>
    </div>

    <div class="spaced-rep">
      <h3>📅 Revision schedule</h3>
      <p style="font-size:12px;font-weight:600;color:var(--cream);opacity:.8;margin-bottom:12px;">Based on your results and the Ebbinghaus forgetting curve — review these before the memory fades.</p>
      ${srSchedule}
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="recap-title">Answer breakdown</div>${recapHtml}
    </div>

    <div class="takeaways">
      <h3>Key Takeaways</h3>
      <ul>
        <li>Match your channel to your message — urgent or sensitive topics need richer, two-way channels</li>
        <li>Semantic noise (jargon, unclear language) is one of the most common and avoidable barriers</li>
        <li>A real feedback loop confirms understanding — asking "do you get it?" is not enough</li>
        <li>Non-verbal cues and written tone carry as much meaning as your words</li>
        <li>Active listening and psychological noise both affect how messages are received</li>
        <li>Information overload is a real barrier — chunk and prioritize your communications</li>
      </ul>
    </div>
  </div>`;

  setTimeout(()=>{
    const ring=document.getElementById('ring');if(ring)ring.style.strokeDashoffset=offset;
    if(showConfetti)spawnConfetti();
    document.querySelectorAll('.cb-bar-fill').forEach(el=>{const w=el.dataset.w;el.style.width='0';setTimeout(()=>{el.style.width=w+'%';},200);});
  },100);
}

function exportStudyGuide(){
  const missed=answers.filter(a=>!a.ok);
  const all=answers;
  let txt='COMMUNICATION BREAKDOWN — STUDY GUIDE\n';
  txt+='Generated: '+new Date().toLocaleDateString()+' | Difficulty: '+difficulty+'\n';
  txt+='Score: '+score+'/'+questions.length+' ('+Math.round(score/questions.length*100)+'%)\n\n';

  if(missed.length){
    txt+='── QUESTIONS TO REVIEW ──\n\n';
    missed.forEach((a,i)=>{
      const q=questions.find(qq=>qq.question===a.q);
      txt+=`${i+1}. ${a.q}\n`;
      txt+=`   Concept: ${a.concept}\n`;
      txt+=`   Correct answer: ${a.options[a.correct]}\n`;
      if(q){txt+=`   What went wrong: ${q.whatWentWrong}\n`;txt+=`   Better approach: ${q.whatShouldHappen}\n`;txt+=`   Source: ${q.citation}\n`;}
      txt+='\n';
    });
  }

  if(Object.keys(peerTeachAnswers).length){
    txt+='── YOUR OWN EXPLANATIONS ──\n\n';
    Object.entries(peerTeachAnswers).forEach(([idx,expl])=>{
      const a=all[parseInt(idx)];
      if(a)txt+=`Q${parseInt(idx)+1}: ${a.q}\nYour explanation: "${expl}"\n\n`;
    });
  }

  txt+='── REVISION SCHEDULE (Ebbinghaus) ──\n';
  const today=new Date();
  const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  txt+=`Day 1 (${addDays(today,1).toLocaleDateString()}): Re-read your wrong answers above\n`;
  txt+=`Day 3 (${addDays(today,3).toLocaleDateString()}): Review Robbins & Judge Ch. 11 sections on ${[...new Set(missed.map(a=>a.concept))].join(', ')||'all concepts'}\n`;
  txt+=`Day 7 (${addDays(today,7).toLocaleDateString()}): Play the game again and compare your score\n\n`;

  txt+='── KEY REFERENCES ──\n';
  txt+='Robbins, S. P., & Judge, T. A. (2019). Organizational behavior (18th ed.). Pearson.\n';
  txt+='Shannon, C. E., & Weaver, W. (1949). The mathematical theory of communication. University of Illinois Press.\n';
  txt+='Daft, R. L., & Lengel, R. H. (1986). Organizational information requirements, media richness. Management Science, 32(5), 554–571.\n';

  const blob=new Blob([txt],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='comm_breakdown_study_guide.txt';a.click();
  URL.revokeObjectURL(url);
}

function spawnConfetti(){
  const wrap=document.getElementById('confetti');if(!wrap)return;
  const cols=['#E8C84A','#8BBCCA','#F5F0D0','#3A7D5A','#E8944A'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()}s;animation-duration:${1+Math.random()}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(el);
  }
}

/* ── LEADERBOARD ── */
function renderLeaderboard(app){
  const lb=getLB();
  const misc=getMisc();
  const diffBg={easy:'#D4EDE0',medium:'#F5F0D0',hard:'#F0D4D4'};

  // top misconceptions
  const miscItems=Object.values(misc).filter(m=>m.total>0).sort((a,b)=>Object.values(b.wrong).reduce((x,y)=>x+y,0)-Object.values(a.wrong).reduce((x,y)=>x+y,0)).slice(0,3);

  app.innerHTML=`<div class="fade-in">
    <div class="lb-head"><h2>🏆 Leaderboard</h2><p>Top scores on this device.</p></div>
    <div class="lb-table">
      ${lb.length===0?`<div class="lb-empty">No scores yet — play a round!</div>`:`
      <div class="lb-row lbh"><span style="width:28px">#</span><span style="flex:1">Name</span><span>Diff</span><span style="margin-left:6px">Score</span></div>
      ${lb.map((e,i)=>`<div class="lb-row">
        <span class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
        <span class="lb-name">${e.name}${e.streak>=3?` 🔥${e.streak}`:''}</span>
        <span class="lb-diff" style="background:${diffBg[e.difficulty]||'#eee'}">${e.difficulty||'med'}</span>
        <span class="lb-score" style="margin-left:6px">${e.score}/${e.total}</span>
      </div>`).join('')}`}
    </div>
    ${miscItems.length?`<div class="misc-dashboard">
      <div class="misc-header"><h3>📊 Instructor: Class Misconceptions</h3></div>
      ${miscItems.map(m=>{const topWrong=Object.entries(m.wrong).sort((a,b)=>b[1]-a[1])[0];return topWrong?`<div class="misc-row"><span class="misc-q">${m.q.slice(0,60)}...<br><em style="font-size:11px;color:var(--muted);">Most chosen wrong: "${topWrong[0].slice(0,40)}"</em></span><span class="misc-pct">${topWrong[1]}x</span></div>`:'';}). join('')}
    </div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-yellow" onclick="switchView('start')">← Back</button>
      ${lb.length?`<button class="btn-red" onclick="clearLB()">Clear scores</button>`:''}
    </div>
  </div>`;
}
function clearLB(){if(confirm('Clear all scores?')){localStorage.removeItem(SK);renderLeaderboard(document.getElementById('app'));}}

/* ── GLOSSARY ── */
function renderGlossary(app){
  app.innerHTML=`<div class="fade-in">
    <div class="lb-head"><h2>📖 Glossary</h2><p>Hover any underlined term in the game for a quick definition.</p></div>
    <div class="glossary-grid">
      ${Object.entries(glossary).map(([term,g])=>`<div class="gloss-card">
        <div class="gloss-term">${term.charAt(0).toUpperCase()+term.slice(1)}</div>
        <div class="gloss-def">${g.def}</div>
        <div class="gloss-src">${g.cite}</div>
        <div class="gloss-ch">📖 ${g.ch}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:14px;"><button class="btn-yellow" onclick="switchView('start')">← Back</button></div>
  </div>`;
}

/* ── SCENARIO BUILDER ── */
function renderBuilder(app){
  app.innerHTML=`<div class="fade-in">
    <div class="lb-head"><h2>🛠 Scenario Builder</h2><p>Create your own communication breakdown scenario. Apply the theory to a situation you have experienced.</p></div>
    <div class="card scenario-builder">
      <label>What is the workplace setting?</label>
      <input type="text" id="sb-setting" placeholder="e.g. A weekly team standup meeting">
      <label>What communication barrier or concept does your scenario illustrate?</label>
      <select id="sb-concept">
        <option value="">Select a concept...</option>
        ${Object.keys(glossary).map(k=>`<option value="${k}">${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join('')}
      </select>
      <label>Describe the breakdown scenario (2–4 sentences):</label>
      <textarea id="sb-scenario" rows="4" placeholder="What happened? Who was involved? What went wrong?"></textarea>
      <label>What should have happened instead?</label>
      <input type="text" id="sb-fix" placeholder="e.g. The manager should have...">
      <button class="btn-yellow" onclick="previewScenario()">Preview my scenario</button>
      <div class="scenario-preview" id="sb-preview"></div>
      <div style="margin-top:12px;display:none;" id="sb-save-row">
        <button class="btn-cream" onclick="saveScenario()">Save to my study guide</button>
      </div>
    </div>
    <div style="margin-top:4px;"><button class="btn-cream" onclick="switchView('start')">← Back</button></div>
  </div>`;
}

function previewScenario(){
  const setting=document.getElementById('sb-setting').value.trim();
  const concept=document.getElementById('sb-concept').value;
  const scenario=document.getElementById('sb-scenario').value.trim();
  const fix=document.getElementById('sb-fix').value.trim();
  if(!scenario||!concept){alert('Please fill in the concept and scenario fields.');return;}
  const prev=document.getElementById('sb-preview');
  prev.style.display='block';
  prev.innerHTML=`<div class="scenario-label">Your scenario — ${concept}</div>
    <p style="font-size:14px;font-weight:600;color:var(--cream);margin-bottom:10px;line-height:1.7;">${setting?`<strong>Setting:</strong> ${setting}<br>`:''}${scenario}</p>
    ${fix?`<p style="font-size:13px;font-weight:700;color:var(--yellow);">✅ Better approach: ${fix}</p>`:''}`;
  document.getElementById('sb-save-row').style.display='block';
}

function saveScenario(){
  const concept=document.getElementById('sb-concept').value;
  const scenario=document.getElementById('sb-scenario').value.trim();
  const fix=document.getElementById('sb-fix').value.trim();
  const entry=`\nSTUDENT-CREATED SCENARIO:\nConcept: ${concept}\nScenario: ${scenario}\nBetter approach: ${fix}\n`;
  const blob=new Blob([entry],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='my_scenario.txt';a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
