<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Breakdown Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --teal:#8BBCCA;
  --teal-dark:#6A9BAA;
  --teal-darker:#4A7A8A;
  --cream:#F5F0D0;
  --cream-dark:#EAE4BC;
  --yellow:#E8C84A;
  --yellow-dark:#C9A830;
  --navy:#1A2535;
  --navy-mid:#2E3F55;
  --text:#1A2535;
  --muted:#4A6070;
  --green-correct:#3A7D5A;
  --green-correct-bg:#D4EDE0;
  --red-wrong:#8B3030;
  --red-wrong-bg:#F0D4D4;
  --border:#1A2535;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--teal);
  background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(26,37,53,0.08) 0%, transparent 50%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 16px 80px;
}

/* HEADER */
header{
  width:100%;max-width:680px;padding:28px 0 0;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'Caveat',cursive;
  font-size:22px;color:var(--cream);
  text-shadow:1px 1px 0 rgba(26,37,53,0.3);
}
.lb-btn{
  background:var(--cream);border:2px solid var(--border);border-radius:8px;
  padding:7px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:var(--navy);cursor:pointer;transition:background .15s,transform .1s;
  box-shadow:2px 2px 0 var(--border);
}
.lb-btn:hover{background:var(--yellow);transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--border);}
.lb-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--border);}

.main{width:100%;max-width:680px;margin-top:32px;}

/* CARD BASE */
.card{
  background:var(--cream);
  border:2.5px solid var(--border);
  border-radius:16px;
  box-shadow:4px 4px 0 var(--border);
  padding:28px;
}

/* START SCREEN */
.start-screen{text-align:center;}
.start-icon{
  width:80px;height:80px;background:var(--yellow);
  border:2.5px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:3px 3px 0 var(--border);
}
.start-icon svg{width:40px;height:40px;}
.start-screen h1{
  font-family:'Caveat',cursive;
  font-size:42px;color:var(--navy);line-height:1.1;
  margin-bottom:12px;
}
.start-screen p{font-size:15px;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto 28px;}

.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.info-chip{
  background:var(--teal);border:2px solid var(--border);border-radius:12px;
  padding:16px 10px;text-align:center;box-shadow:3px 3px 0 var(--border);
}
.info-chip .val{font-family:'Caveat',cursive;font-size:28px;color:var(--cream);display:block;margin-bottom:2px;}
.info-chip .lbl{font-size:11px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:.5px;}

.btn-start{
  background:var(--yellow);color:var(--navy);
  border:2.5px solid var(--border);border-radius:12px;
  padding:15px 40px;font-size:16px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:4px 4px 0 var(--border);
  transition:transform .1s,box-shadow .1s;
}
.btn-start:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--border);}
.btn-start:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--border);}

/* PROGRESS */
.progress-wrap{margin-bottom:20px;}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-meta span{font-size:13px;font-weight:700;color:var(--cream);}
.progress-track{height:10px;background:rgba(26,37,53,0.2);border-radius:99px;border:1.5px solid var(--border);}
.progress-fill{height:100%;background:var(--yellow);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* TIMER */
.timer-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.timer-bar-track{flex:1;height:10px;background:rgba(26,37,53,0.2);border-radius:99px;border:1.5px solid var(--border);overflow:hidden;}
.timer-bar-fill{height:100%;border-radius:99px;transition:width .1s linear,background .3s;}
.timer-num{font-family:'Caveat',cursive;font-size:20px;font-weight:700;min-width:36px;text-align:right;color:var(--cream);}

/* BADGE */
.badge{
  display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;
  text-transform:uppercase;padding:5px 14px;border-radius:99px;
  margin-bottom:14px;border:2px solid var(--border);
  box-shadow:2px 2px 0 var(--border);
}
.badge.barrier{background:#F0D4D4;color:#8B3030;}
.badge.channel{background:#D4E0F0;color:#1A3A70;}
.badge.feedbackloop{background:#E0D4F0;color:#4A1A80;}
.badge.nonverbal{background:#F0E8D4;color:#704A1A;}
.badge.active-listening{background:var(--green-correct-bg);color:var(--green-correct);}

/* SCENARIO */
.scenario-card{
  background:var(--teal);
  border:2px solid var(--border);border-radius:12px;
  padding:18px 20px;margin-bottom:18px;
  box-shadow:3px 3px 0 var(--border);
}
.scenario-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--cream);margin-bottom:8px;}
.scenario-text{font-size:14px;line-height:1.75;color:var(--cream);}

/* QUESTION */
.question{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:16px;line-height:1.4;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.opt{
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:13px 16px;text-align:left;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--navy);
  font-family:'Nunito',sans-serif;line-height:1.5;
  display:flex;align-items:flex-start;gap:12px;
  box-shadow:3px 3px 0 var(--border);
  transition:transform .1s,box-shadow .1s,background .1s;
}
.opt:hover:not(:disabled){background:var(--cream-dark);transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--border);}
.opt:active:not(:disabled){transform:translate(1px,1px);box-shadow:2px 2px 0 var(--border);}
.opt-letter{
  width:28px;height:28px;min-width:28px;border-radius:50%;
  background:var(--teal);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:16px;font-weight:700;color:var(--cream);
  margin-top:0px;transition:all .15s;flex-shrink:0;
}
.opt.correct{background:var(--green-correct-bg);border-color:var(--green-correct);box-shadow:3px 3px 0 var(--green-correct);}
.opt.correct .opt-letter{background:var(--green-correct);border-color:var(--green-correct);color:#fff;}
.opt.wrong{background:var(--red-wrong-bg);border-color:var(--red-wrong);box-shadow:3px 3px 0 var(--red-wrong);}
.opt.wrong .opt-letter{background:var(--red-wrong);border-color:var(--red-wrong);color:#fff;}
.opt:disabled{cursor:default;}

/* FEEDBACK */
.feedback{
  border-radius:12px;padding:15px 17px;font-size:14px;line-height:1.7;
  display:none;margin-bottom:18px;border:2px solid;font-weight:600;
}
.feedback.correct{background:var(--green-correct-bg);border-color:var(--green-correct);color:#1A4A30;}
.feedback.wrong{background:var(--red-wrong-bg);border-color:var(--red-wrong);color:#5A1A1A;}
.feedback strong{font-weight:800;}

/* NEXT BTN */
.btn-next{
  background:var(--yellow);color:var(--navy);
  border:2.5px solid var(--border);border-radius:12px;
  padding:13px 28px;font-size:15px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;display:none;
  box-shadow:3px 3px 0 var(--border);
  transition:transform .1s,box-shadow .1s;
}
.btn-next:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--border);}
.btn-next:active{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--border);}

/* RESULTS */
.results{text-align:center;}
.confetti-wrap{position:relative;height:80px;margin-bottom:0;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;animation:confettiFall 1.4s ease-out both;}
@keyframes confettiFall{from{transform:translateY(-10px) rotate(0deg);opacity:1;}to{transform:translateY(90px) rotate(400deg);opacity:0;}}

.score-ring{width:130px;height:130px;margin:0 auto 20px;position:relative;}
.score-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(26,37,53,0.15);stroke-width:10;}
.ring-fill{fill:none;stroke:var(--yellow);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-family:'Caveat',cursive;font-size:38px;color:var(--navy);line-height:1;}
.score-pct{font-size:13px;font-weight:700;color:var(--muted);}
.results h2{font-family:'Caveat',cursive;font-size:32px;margin-bottom:8px;color:var(--navy);}
.results .sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto 24px;font-weight:600;}

/* RECAP */
.recap{margin-bottom:20px;text-align:left;}
.recap-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px;}
.recap-item{
  background:#fff;border:2px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;
  box-shadow:2px 2px 0 var(--border);
}
.recap-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:1px;border:2px solid;}
.recap-icon.ok{background:var(--green-correct-bg);color:var(--green-correct);border-color:var(--green-correct);}
.recap-icon.bad{background:var(--red-wrong-bg);color:var(--red-wrong);border-color:var(--red-wrong);}
.recap-q{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--navy);}
.recap-a{font-size:12px;color:var(--muted);font-weight:600;}
.recap-a.wrong-ans{color:var(--red-wrong);}

/* TAKEAWAYS */
.takeaways{
  background:var(--teal);border:2px solid var(--border);border-radius:14px;
  padding:20px;text-align:left;margin-bottom:22px;box-shadow:3px 3px 0 var(--border);
}
.takeaways h3{font-family:'Caveat',cursive;font-size:20px;color:var(--cream);margin-bottom:12px;}
.takeaways ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.takeaways li{font-size:13px;font-weight:600;color:var(--cream);line-height:1.6;display:flex;gap:10px;}
.takeaways li::before{content:"";width:8px;height:8px;min-width:8px;background:var(--yellow);border-radius:50%;margin-top:7px;border:1.5px solid var(--border);}

/* RESULT BTNS */
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:0;}

/* LEADERBOARD */
.lb-header{margin-bottom:20px;}
.lb-header h2{font-family:'Caveat',cursive;font-size:34px;color:var(--cream);margin-bottom:4px;}
.lb-header p{font-size:13px;font-weight:600;color:var(--cream);opacity:.8;}
.lb-table{
  background:var(--cream);border:2.5px solid var(--border);border-radius:16px;
  overflow:hidden;margin-bottom:20px;box-shadow:4px 4px 0 var(--border);
}
.lb-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1.5px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.lb-row.header{background:var(--teal);padding:10px 18px;}
.lb-row.header span{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--cream);}
.lb-rank{width:32px;text-align:center;font-family:'Caveat',cursive;font-size:20px;color:var(--muted);}
.lb-rank.top{color:var(--navy);}
.lb-name{flex:1;font-size:15px;font-weight:700;color:var(--navy);}
.lb-score{font-family:'Caveat',cursive;font-size:22px;color:var(--navy);}
.lb-empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;font-weight:600;}

.btn-danger{
  background:#fff;color:var(--red-wrong);border:2px solid var(--red-wrong);
  border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Nunito',sans-serif;
  box-shadow:2px 2px 0 var(--red-wrong);transition:transform .1s,box-shadow .1s;
}
.btn-danger:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--red-wrong);}

/* FADE IN */
.fade-in{animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:480px){
  .info-grid{grid-template-columns:repeat(3,1fr);}
  .start-screen h1{font-size:34px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">Communication Breakdown</div>
  <button class="lb-btn" onclick="switchView('leaderboard')">🏆 Leaderboard</button>
</header>

<div class="main" id="app"></div>

<script>
const STORAGE_KEY = 'comm_bdwn_lb_v3';
const TIMER_SECONDS = 30;
const letters = ['A','B','C','D'];

const questions = [
  {badge:"barrier",badgeLabel:"Communication Barrier",scenario:"Marcus sends a lengthy email to his team at 4:58 PM on Friday detailing urgent changes to Monday's project plan. On Monday, three team members say they never saw it, and two others skimmed it and missed the key deadline changes.",question:"What is the primary communication breakdown here?",options:["The message was too long and contained jargon","Wrong timing and channel — urgent info sent via a low-attention medium at a low-attention time","Marcus did not ask for feedback","The team members were not motivated to read the email"],correct:1,feedback:"Matching the channel to the message is critical. Urgent, time-sensitive information sent late on a Friday via email — a passive channel — is likely to be missed. A direct message, call, or Monday morning meeting would have been far more effective."},
  {badge:"barrier",badgeLabel:"Semantic Noise",scenario:"Priya, a new HR intern, is asked to \"action the onboarding synergy deliverables before EOD.\" She spends an hour trying to figure out what this means and eventually completes the wrong tasks.",question:"Which type of communication noise caused this breakdown?",options:["Physical noise — too many distractions in the office","Psychological noise — Priya was stressed and distracted","Semantic noise — jargon and unclear language confused the receiver","Cultural noise — different workplace backgrounds"],correct:2,feedback:"Semantic noise occurs when language is unclear, overly technical, or full of jargon the receiver does not understand. \"Action,\" \"synergy deliverables,\" and \"EOD\" can all confuse someone new. Clear, plain language prevents this entirely."},
  {badge:"feedbackloop",badgeLabel:"Feedback Loop",scenario:"During a team meeting, David presents a new process change. He asks \"Does everyone understand?\" and the room nods. Two weeks later, the team has implemented it four different ways because each person had a different interpretation.",question:"What step in the communication process failed?",options:["The source — David did not prepare well enough","The channel — a meeting was the wrong format","Feedback — yes/no confirmation does not verify actual understanding","The environment — the meeting room was distracting"],correct:2,feedback:"Asking \"do you understand?\" is a weak feedback loop — people will almost always say yes, even when they do not. Effective feedback means asking receivers to paraphrase the message or describe their next steps. This closes the loop and confirms shared understanding."},
  {badge:"nonverbal",badgeLabel:"Non-Verbal Cues",scenario:"Sofia is video-calling a client to discuss a contract renewal. She is multitasking — typing responses to other emails while speaking. The client notices her eyes moving away from the camera and hears keyboard clicks, and later declines to renew.",question:"What communication concept best explains the client's reaction?",options:["The message was too direct and intimidating","Non-verbal cues — distracted body language contradicted Sofia's verbal message","The channel was inappropriate — email would have been better","Cultural differences in communication style"],correct:1,feedback:"Non-verbal communication — eye contact, body language, and even background sounds — carries significant meaning, especially in video calls. Sofia's non-verbal cues signalled disinterest even if her words were positive. Effective communicators align their non-verbal behaviour with their intended message."},
  {badge:"channel",badgeLabel:"Channel Selection",scenario:"James needs to deliver constructive feedback to an employee about a performance issue. He sends a detailed email listing all the concerns. The employee reads it during a busy workday, feels blindsided, and becomes defensive during the follow-up meeting.",question:"What was James's key communication mistake?",options:["He gave too much feedback at once","Email is a poor channel for sensitive, high-stakes messages — it lacks tone and two-way dialogue","He should have copied HR on the email","The feedback was not specific enough"],correct:1,feedback:"Channel selection matters — not all messages are equal. Sensitive topics like performance feedback require a rich channel (face-to-face or video call) that allows for tone, empathy, and real-time dialogue. Email strips away these cues and gives the receiver no way to respond in the moment."},
  {badge:"active-listening",badgeLabel:"Active Listening",scenario:"During a client call, Rachel keeps interrupting to offer solutions before the client finishes explaining the problem. The client ends the call feeling unheard and emails afterward saying they want to work with a different rep.",question:"What communication skill did Rachel fail to demonstrate?",options:["Encoding — she did not prepare her message properly","Active listening — she prioritized speaking over understanding the sender's full message","Channel selection — the phone was the wrong medium","Feedback — she did not summarize the call afterward"],correct:1,feedback:"Active listening means fully receiving and processing the sender's message before responding. Interrupting to offer solutions signals that you are not truly listening — it shifts focus from the sender's needs to your own agenda. Letting the client finish and then paraphrasing their concern builds trust and surfaces the real problem."},
  {badge:"barrier",badgeLabel:"Psychological Noise",scenario:"An employee receives important instructions from her manager right after being told she is not getting the promotion she expected. She nods along but later cannot recall any details of what was said.",question:"What best explains why she missed the information?",options:["The manager used too much jargon","Physical noise in the office disrupted the message","Psychological noise — her emotional state interfered with her ability to receive the message","The message was delivered in the wrong channel"],correct:2,feedback:"Psychological noise refers to internal emotional interference — stress, anxiety, strong emotions — that prevents a receiver from fully processing a message. Being emotionally activated by bad news creates a mental barrier that can block retention even when someone appears to be listening."},
  {badge:"feedbackloop",badgeLabel:"Upward Communication",scenario:"A junior analyst notices a serious error in the financial model being used for a client presentation. He decides not to say anything because his manager seems confident and he does not want to seem like he is overstepping.",question:"What organizational communication issue does this illustrate?",options:["Poor downward communication from management","A barrier to upward communication — hierarchy and fear suppressed critical feedback","Semantic noise — he did not understand the model himself","Incorrect channel selection for raising concerns"],correct:1,feedback:"Upward communication — information flowing from lower to higher levels — is often blocked by hierarchy, fear, or cultural norms around deference to authority. Organizations with strong communication cultures actively encourage employees to raise concerns without fear, because suppressed feedback leads to costly errors."},
  {badge:"nonverbal",badgeLabel:"Written Tone",scenario:"Amir sends a quick reply to a colleague's detailed proposal: \"Sure, fine.\" The colleague spends the rest of the week anxious that Amir hates the idea, and brings it up apologetically in the next team meeting — to Amir's complete surprise.",question:"What caused this miscommunication?",options:["Amir used the wrong channel — he should have called","Written communication lacks non-verbal and tonal cues, so a brief reply was misread as disapproval","Amir should have provided more detailed feedback on the proposal","The colleague was too emotionally sensitive"],correct:1,feedback:"Written messages — especially short ones — strip away tone of voice and facial expressions. \"Sure, fine\" can read as enthusiastic agreement or cold indifference depending on the reader's emotional state. Brief written replies to sensitive situations require intentional warmth and clarity to prevent misinterpretation."},
  {badge:"channel",badgeLabel:"Information Overload",scenario:"A manager sends a single email with 14 action items, three attached policy documents, two spreadsheets, and a 40-slide deck. She expects responses on all items by end of day. Her team completes only three of the action items and misses the rest.",question:"What communication problem best describes this situation?",options:["Semantic noise — the documents contained unclear language","Information overload — the volume of content exceeded the team's ability to process and act","Poor feedback — the team should have confirmed receipt","Cultural barriers — the team had different work norms"],correct:1,feedback:"Information overload occurs when the amount or complexity of information exceeds a receiver's capacity to process it. Dumping 14 action items and five attachments into one message guarantees that much of it will be missed. Effective communicators chunk information, prioritize clearly, and separate urgent actions from reference material."}
];

let current=0,score=0,soloAnswers=[],answered=false,timerInterval=null,timeLeft=TIMER_SECONDS,view='start';

function getLeaderboard(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch{return[];}}
function saveToLeaderboard(entry){const lb=getLeaderboard();lb.push(entry);lb.sort((a,b)=>b.score-a.score||a.time-b.time);localStorage.setItem(STORAGE_KEY,JSON.stringify(lb.slice(0,20)));}

function render(){
  const app=document.getElementById('app');
  if(view==='start') renderStart(app);
  else if(view==='game') renderGame(app);
  else if(view==='results') renderResults(app);
  else if(view==='leaderboard') renderLeaderboard(app);
}

function renderStart(app){
  clearTimer();
  app.innerHTML=`<div class="card fade-in start-screen">
    <div class="start-icon">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 11C7 9.34 8.34 8 10 8H30C31.66 8 33 9.34 33 11V24C33 25.66 31.66 27 30 27H22L15 33V27H10C8.34 27 7 25.66 7 24V11Z" stroke="#1A2535" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
        <circle cx="14" cy="18" r="2.5" fill="#1A2535"/>
        <circle cx="20" cy="18" r="2.5" fill="#1A2535"/>
        <circle cx="26" cy="18" r="2.5" fill="#1A2535"/>
      </svg>
    </div>
    <h1>Communication Breakdown</h1>
    <p>Ten workplace scenarios. Spot what went wrong and choose the right fix. Each question tests a core concept from your communication process workshop.</p>
    <div class="info-grid">
      <div class="info-chip"><span class="val">10</span><span class="lbl">Scenarios</span></div>
      <div class="info-chip"><span class="val">30s</span><span class="lbl">Per Question</span></div>
      <div class="info-chip"><span class="val">OB</span><span class="lbl">Concepts</span></div>
    </div>
    <button class="btn-start" onclick="startGame()">Start the game →</button>
  </div>`;
}

function startGame(){current=0;score=0;soloAnswers=[];answered=false;view='game';render();}
function switchView(v){clearTimer();view=v;render();}

function renderGame(app){
  const q=questions[current];
  const pct=(current/questions.length)*100;
  const tpct=(timeLeft/TIMER_SECONDS)*100;
  const tcol=timeLeft>15?'#E8C84A':timeLeft>7?'#E8944A':'#E84A4A';
  app.innerHTML=`<div class="fade-in">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Question ${current+1} of ${questions.length}</span>
        <span>${score} correct</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="timer-wrap">
      <div class="timer-bar-track"><div class="timer-bar-fill" id="tbar" style="width:${tpct}%;background:${tcol}"></div></div>
      <span class="timer-num" id="tnum">${timeLeft}s</span>
    </div>
    <div class="card">
      <span class="badge ${q.badge}">${q.badgeLabel}</span>
      <div class="scenario-card"><div class="scenario-label">Workplace Scenario</div><p class="scenario-text">${q.scenario}</p></div>
      <p class="question">${q.question}</p>
      <div class="options" id="opts">
        ${q.options.map((o,i)=>`<button class="opt" onclick="choose(${i})"><span class="opt-letter">${letters[i]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <button class="btn-next" id="nxt" onclick="nextQ()">${current===questions.length-1?'See my results →':'Next question →'}</button>
    </div>
  </div>`;
  startTimer();
}

function startTimer(){
  clearTimer();timeLeft=TIMER_SECONDS;
  timerInterval=setInterval(()=>{
    timeLeft--;
    const tbar=document.getElementById('tbar'),tnum=document.getElementById('tnum');
    if(!tbar||!tnum){clearTimer();return;}
    const p=(timeLeft/TIMER_SECONDS)*100;
    const c=timeLeft>15?'#E8C84A':timeLeft>7?'#E8944A':'#E84A4A';
    tbar.style.width=p+'%';tbar.style.background=c;
    tnum.textContent=timeLeft+'s';
    if(timeLeft<=0){clearTimer();autoTimeout();}
  },1000);
}
function clearTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}

function autoTimeout(){
  if(answered)return;answered=true;
  const q=questions[current];
  document.querySelectorAll('.opt').forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('correct');});
  const fb=document.getElementById('fb');
  if(fb){fb.style.display='block';fb.className='feedback wrong';fb.innerHTML=`<strong>Time's up!</strong> ${q.feedback}`;}
  soloAnswers.push({q:q.question,chosen:-1,correct:q.correct,options:q.options,ok:false});
  const nxt=document.getElementById('nxt');if(nxt)nxt.style.display='inline-block';
}

function choose(i){
  if(answered)return;answered=true;clearTimer();
  const q=questions[current];
  document.querySelectorAll('.opt').forEach((b,idx)=>{b.disabled=true;if(idx===q.correct)b.classList.add('correct');else if(idx===i&&i!==q.correct)b.classList.add('wrong');});
  const ok=i===q.correct;if(ok)score++;
  soloAnswers.push({q:q.question,chosen:i,correct:q.correct,options:q.options,ok});
  const fb=document.getElementById('fb');
  if(fb){fb.style.display='block';fb.className=`feedback ${ok?'correct':'wrong'}`;fb.innerHTML=`<strong>${ok?'Correct!':'Not quite.'}</strong> ${q.feedback}`;}
  const nxt=document.getElementById('nxt');if(nxt)nxt.style.display='inline-block';
}

function nextQ(){clearTimer();current++;answered=false;if(current>=questions.length){view='results';render();}else render();}

function renderResults(app){
  clearTimer();
  const pct=Math.round((score/questions.length)*100);
  let msg,sub;
  if(pct===100){msg="Perfect score!";sub="Outstanding — you identified every communication breakdown correctly.";}
  else if(pct>=70){msg="Strong performance!";sub="You caught most of the breakdowns. Review the ones you missed to sharpen your instincts.";}
  else if(pct>=50){msg="Good effort!";sub="You spotted several key issues. Keep the communication process model in mind as you practice.";}
  else{msg="Keep building.";sub="Communication breakdowns are subtle in real life too. Revisit the feedback on each question.";}

  const r=50,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  const showConfetti=pct>=80;

  const name=prompt('Enter your name for the leaderboard (or cancel to skip):');
  if(name&&name.trim()) saveToLeaderboard({name:name.trim(),score,total:questions.length,pct,time:Date.now()});

  const recapHtml=soloAnswers.map((a,i)=>`
    <div class="recap-item">
      <div class="recap-icon ${a.ok?'ok':'bad'}">${a.ok?'✓':'✗'}</div>
      <div>
        <div class="recap-q">Q${i+1}: ${a.q}</div>
        ${!a.ok?`<div class="recap-a wrong-ans">You chose: ${a.chosen===-1?'Timed out':a.options[a.chosen]}</div><div class="recap-a">Correct: ${a.options[a.correct]}</div>`:'<div class="recap-a">Correct!</div>'}
      </div>
    </div>`).join('');

  app.innerHTML=`<div class="fade-in">
    ${showConfetti?`<div class="confetti-wrap" id="confetti"></div>`:''}
    <div class="card" style="text-align:center;margin-bottom:16px;">
      <div class="score-ring" style="margin-bottom:16px;">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="${r}"/>
          <circle class="ring-fill" cx="65" cy="65" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="ring"/>
        </svg>
        <div class="score-center"><span class="score-num">${score}/${questions.length}</span><span class="score-pct">${pct}%</span></div>
      </div>
      <h2>${msg}</h2>
      <p class="sub">${sub}</p>
      <div class="result-btns">
        <button class="btn-start" style="font-size:14px;padding:12px 24px;" onclick="restartGame()">Play again</button>
        <button class="lb-btn" style="padding:12px 20px;font-size:14px;" onclick="switchView('leaderboard')">🏆 Leaderboard</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="recap"><div class="recap-title">Answer Breakdown</div>${recapHtml}</div>
    </div>
    <div class="takeaways">
      <h3>Key Takeaways</h3>
      <ul>
        <li>Match your channel to your message — urgent or sensitive topics need richer, two-way channels</li>
        <li>Semantic noise (jargon, unclear language) is one of the most common and avoidable barriers</li>
        <li>A real feedback loop confirms understanding — asking "do you get it?" is not enough</li>
        <li>Non-verbal cues and written tone carry as much meaning as your words</li>
        <li>Active listening and psychological noise both affect how messages are received</li>
        <li>Information overload is a real barrier — chunk and prioritize your communications</li>
      </ul>
    </div>
  </div>`;

  setTimeout(()=>{
    const ring=document.getElementById('ring');if(ring)ring.style.strokeDashoffset=offset;
    if(showConfetti)spawnConfetti();
  },100);
}

function spawnConfetti(){
  const wrap=document.getElementById('confetti');if(!wrap)return;
  const cols=['#E8C84A','#8BBCCA','#F5F0D0','#1A2535','#E8C84A','#8BBCCA'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-delay:${Math.random()*0.9}s;animation-duration:${0.9+Math.random()*0.9}s;border-radius:${Math.random()>.5?'50%':'3px'};`;
    wrap.appendChild(el);
  }
}

function restartGame(){view='start';render();}

function renderLeaderboard(app){
  const lb=getLeaderboard();
  app.innerHTML=`<div class="fade-in">
    <div class="lb-header">
      <h2>🏆 Leaderboard</h2>
      <p>Top scores from all players on this device.</p>
    </div>
    <div class="lb-table">
      ${lb.length===0?`<div class="lb-empty">No scores yet — play a round to get on the board!</div>`:`
      <div class="lb-row header">
        <span style="width:32px">#</span><span style="flex:1">Name</span><span>Score</span>
      </div>
      ${lb.map((e,i)=>`<div class="lb-row">
        <span class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
        <span class="lb-name">${e.name}</span>
        <span class="lb-score">${e.score}/${e.total}</span>
      </div>`).join('')}`}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-start" style="font-size:14px;padding:12px 24px;" onclick="switchView('start')">← Back</button>
      ${lb.length>0?`<button class="btn-danger" onclick="clearLB()">Clear scores</button>`:''}
    </div>
  </div>`;
}

function clearLB(){if(confirm('Clear all scores?')){localStorage.removeItem(STORAGE_KEY);renderLeaderboard(document.getElementById('app'));}}

render();
</script>
</body>
</html>
